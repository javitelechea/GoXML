<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoXML</title>
    <!-- Fuentes premium -->
    <link href="https://fonts.googleapis.com/css2?family=Aldrich&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Librerías base -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://sql.js.org/dist/sql-wasm.js"></script>
    <style>
        :root {
            font-family: 'Inter', system-ui, Avenir, Helvetica, Arial, sans-serif;
            color-scheme: dark;
            color: rgba(255, 255, 255, 0.87);
            background-color: #0f172a;
        }
        body { margin: 0; display: flex; place-items: center; min-width: 320px; min-height: 100vh; justify-content: center; }
        .container { display: flex; flex-direction: column; gap: 2rem; align-items: center; max-width: 1200px; padding: 2rem; text-align: center; width: 100%; }
        header h1 { font-family: 'Aldrich', sans-serif; font-size: 3.5em; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        header h1 span { color: #ffffff; }
        header h1 .gradient-text { background: linear-gradient(to right, #60a5fa, #a855f7); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: #94a3b8; font-size: 1.1rem; }
        .section { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; padding: 2rem; width: 100%; box-sizing: border-box; }
        .dropzone { border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 1rem; padding: 3rem; cursor: pointer; transition: all 0.3s ease; background: rgba(255, 255, 255, 0.03); }
        .dropzone:hover { border-color: #60a5fa; background: rgba(96, 165, 250, 0.05); }
        .controls { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; align-items: center; margin-top: 1.5rem; }
        .input-group { display: flex; flex-direction: column; align-items: flex-start; gap: 0.5rem; }
        input[type="text"] { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 0.5rem; padding: 0.75rem; color: white; width: 150px; font-size: 1rem; text-align: center; }
        button { border: none; font-weight: 600; padding: 0.8rem 1.8rem; border-radius: 0.8rem; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5); filter: brightness(1.1); }
        .btn-nav { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .btn-nav:hover { background: rgba(255, 255, 255, 0.1); border-color: #60a5fa; transform: translateY(-2px); }
        .btn-admin { background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.3); color: #a855f7; }
        .btn-admin:hover { background: rgba(168, 85, 247, 0.2); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(168, 85, 247, 0.2); }
        .btn-inspector { background: rgba(96, 165, 250, 0.1); border: 1px solid rgba(96, 165, 250, 0.3); color: #60a5fa; }
        .btn-inspector:hover { background: rgba(96, 165, 250, 0.2); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(96, 165, 250, 0.2); }
        .table-container { max-height: 500px; overflow-y: auto; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent; margin-top: 1rem; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; }
        th { background: #1e293b; padding: 1rem; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid rgba(255, 255, 255, 0.1); font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; }
        td { padding: 0.6rem 1rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); background: rgba(30, 41, 59, 0.2); font-size: 0.9rem; }
        .manager-input { background: rgba(15, 23, 42, 0.6) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white; width: 100%; padding: 0.5rem !important; border-radius: 0.4rem; }
        .badge { background: rgba(96, 165, 250, 0.2); color: #60a5fa; padding: 0.2rem 0.5rem; border-radius: 0.4rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const formatTime = (seconds) => {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = (seconds % 60).toFixed(2);
            const mm = m.toString().padStart(2, '0');
            return h > 0 ? `${h}:${mm}:${s.padStart(5, '0')}` : `${mm}:${s.padStart(5, '0')}`;
        };

        const parseTime = (timeStr) => {
            if (typeof timeStr === 'number') return timeStr;
            const parts = timeStr.trim().split(':').map(p => parseFloat(p) || 0);
            if (parts.length === 3) return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
            if (parts.length === 2) return (parts[0] * 60) + parts[1];
            return parts[0] || 0;
        };

        const escapeXml = (unsafe) => {
            if (!unsafe) return "";
            return unsafe.toString().replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":"&apos;"}[c]));
        };

        const parseLongoMatchProject = (rawText) => {
            const data = JSON.parse(rawText);
            if (!data.Timeline) throw new Error("No se encontró la sección Timeline.");
            return data.Timeline.map(event => ({
                id: event.ID || Math.random().toString(36).substr(2, 9),
                start: parseFloat(event.Start || 0),
                end: parseFloat(event.Stop || event.Start || 0),
                code: event.Name || ""
            }));
        };

        const parseSportscodeTimeline = (rawText) => {
            if (rawText.trim().startsWith('{')) {
                const data = JSON.parse(rawText);
                const events = [];
                data.timeline.rows.forEach(row => {
                    const code = row.name || 'Unknown';
                    if (row.instances) row.instances.forEach(inst => events.push({
                        id: inst.uniqueId || inst.instanceNum || Math.random(),
                        start: parseFloat(inst.startTime) || 0,
                        end: parseFloat(inst.endTime) || 0,
                        code: code
                    }));
                });
                return events;
            }
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(rawText, "text/xml");
            const instances = xmlDoc.getElementsByTagName("instance");
            const events = [];
            for (let i = 0; i < instances.length; i++) {
                const inst = instances[i];
                events.push({
                    id: inst.getElementsByTagName("ID")[0]?.textContent || '',
                    start: parseFloat(inst.getElementsByTagName("start")[0]?.textContent) || 0,
                    end: parseFloat(inst.getElementsByTagName("end")[0]?.textContent) || 0,
                    code: inst.getElementsByTagName("code")[0]?.textContent || 'Unknown'
                });
            }
            return events;
        };

        const parseNacmacFile = async (arrayBuffer) => {
            if (!window.initSqlJs) throw new Error("Motor SQLite no cargado.");
            const SQL = await initSqlJs({ locateFile: file => `https://sql.js.org/dist/${file}` });
            const db = new SQL.Database(new Uint8Array(arrayBuffer));
            let fps = 25;
            try {
                const videoRes = db.exec("SELECT FPS FROM Videos LIMIT 1");
                if (videoRes.length > 0 && videoRes[0].values[0]) {
                    fps = parseFloat(videoRes[0].values[0][0]) || 25;
                }
            } catch (e) { console.warn("Usando fallback de 25 fps"); }

            const data = db.exec("SELECT Categoria, TI, TF, Tclick FROM Mediciones");
            if (data.length === 0 || !data[0].values) return [];
            
            const columns = data[0].columns;
            const values = data[0].values;
            const idxCat = columns.indexOf('Categoria');
            const idxTI = columns.indexOf('TI');
            const idxTF = columns.indexOf('TF');
            const idxTClick = columns.indexOf('Tclick');

            return values.map((row, i) => {
                const start = parseFloat(row[idxTI] || row[idxTClick] || 0) / fps;
                const end = parseFloat(row[idxTF] || (row[idxTI] || row[idxTClick] || 0)) / fps;
                return { id: (i+1).toString(), start, end, code: String(row[idxCat] || "Sin Categoría") };
            });
        };

        const normalizeEvents = (events) => {
            const sorted = [...events].sort((a, b) => a.start - b.start);
            return sorted.map((event, index) => ({ ...event, id: (index + 1).toString() }));
        };

        const buildXml = (events) => {
            const HEADER = '<?xml version="1.0" encoding="utf-8"?>';
            const instancesXml = events.map(inst => `
    <instance>
      <ID>${inst.id}</ID>
      <start>${inst.start.toFixed(2)}</start>
      <end>${inst.end.toFixed(2)}</end>
      <code>${escapeXml(inst.code)}</code>
    </instance>`).join('');
            return `${HEADER}\n<file>\n  <ALL_INSTANCES>${instancesXml}\n  </ALL_INSTANCES>\n</file>`;
        };

        function App() {
            const [view, setView] = useState('main'); 
            const [instances, setInstances] = useState([]);
            const [fileType, setFileType] = useState("");
            const [targetStartTimeStr, setTargetStartTimeStr] = useState("00:00");
            const [currentStartTime, setCurrentStartTime] = useState(0);

            const handleFile = async (event) => {
                const file = event.target.files ? event.target.files[0] : (event.dataTransfer ? event.dataTransfer.files[0] : null);
                if (!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        let rawEvents = [];
                        if (ext === 'nacmac') rawEvents = await parseNacmacFile(e.target.result);
                        else if (ext === 'lgm') rawEvents = parseLongoMatchProject(e.target.result);
                        else rawEvents = parseSportscodeTimeline(e.target.result);
                        
                        const norm = normalizeEvents(rawEvents);
                        setInstances(norm);
                        setFileType(ext.toUpperCase());
                        const autoStart = norm.length > 0 ? Math.min(...norm.map(i => i.start)) : 0;
                        setCurrentStartTime(autoStart);
                        setTargetStartTimeStr(formatTime(autoStart));
                    } catch (err) { alert(err.message); }
                };
                if (ext === 'nacmac') reader.readAsArrayBuffer(file);
                else reader.readAsText(file);
            };

            const downloadXml = () => {
                try {
                    const xmlContent = buildXml(instances);
                    const blob = new Blob([xmlContent], { type: 'text/xml' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'converted.xml';
                    a.click();
                    setTimeout(() => URL.revokeObjectURL(url), 100);
                } catch (e) { alert("Error: " + e.message); }
            };

            const applyShift = () => {
                const targetSecs = parseTime(targetStartTimeStr);
                const offset = targetSecs - currentStartTime;
                const shifted = instances.map(inst => ({ ...inst, start: Math.max(0, inst.start + offset), end: Math.max(0, inst.end + offset) }));
                setInstances(normalizeEvents(shifted));
                setCurrentStartTime(targetSecs);
            };

            const updateTypeCode = (oldCode, newCode) => {
                setInstances(instances.map(inst => inst.code === oldCode ? { ...inst, code: newCode } : inst));
            };

            const updateInstanceValue = (idx, field, value) => {
                const updated = [...instances];
                if (field === 'start' || field === 'end') updated[idx][field] = parseTime(value);
                else updated[idx][field] = value;
                setInstances(normalizeEvents(updated));
            };

            const uniqueTypes = [...new Set(instances.map(inst => inst.code))].sort();

            if (view === 'editor') return (
                <div className="container" style={{maxWidth:'800px'}}>
                    <header><h1><span>Go</span><span className="gradient-text">XML</span></h1><p>Gestión de categorías</p></header>
                    <div className="section" style={{textAlign:'left'}}>
                        <button className="btn-nav" onClick={() => setView('main')} style={{marginBottom:'1rem'}}>← Volver</button>
                        <div className="table-container">
                            <table>
                                <thead><tr><th>Actual</th><th>Nuevo</th><th>Eventos</th></tr></thead>
                                <tbody>{uniqueTypes.map((code, idx) => (
                                    <tr key={idx}><td>{code}</td><td><input className="manager-input" defaultValue={code} onBlur={e => updateTypeCode(code, e.target.value)} /></td><td><span className="badge">{instances.filter(i => i.code === code).length}</span></td></tr>
                                ))}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            if (view === 'inspector') return (
                <div className="container" style={{maxWidth:'1200px'}}>
                    <header><h1><span>Go</span><span className="gradient-text">XML</span></h1><p>Edición de eventos</p></header>
                    <div className="section" style={{textAlign:'left'}}>
                        <button className="btn-nav" onClick={() => setView('main')} style={{marginBottom:'1rem'}}>← Volver</button>
                        <div className="table-container">
                            <table>
                                <thead><tr><th>ID</th><th>Código</th><th>Inicio</th><th>Fin</th></tr></thead>
                                <tbody>{instances.map((inst, idx) => (
                                    <tr key={inst.id}><td>{inst.id}</td><td><input className="manager-input" value={inst.code} onChange={e => updateInstanceValue(idx, 'code', e.target.value)} /></td><td><input className="manager-input" value={formatTime(inst.start)} onChange={e => updateInstanceValue(idx, 'start', e.target.value)} /></td><td><input className="manager-input" value={formatTime(inst.end)} onChange={e => updateInstanceValue(idx, 'end', e.target.value)} /></td></tr>
                                ))}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="container">
                    <header><h1><span>Go</span><span className="gradient-text">XML</span></h1><p>Convertir y editar cualquier archivo a XML</p></header>
                    <div className="section">
                        {!instances.length ? (
                            <>
                                <div className="dropzone" onClick={() => document.getElementById('f').click()} onDragOver={e => {e.preventDefault();e.stopPropagation();}} onDrop={e => {e.preventDefault();e.stopPropagation();handleFile(e);}}>
                                    <input id="f" type="file" style={{display:'none'}} onChange={handleFile} accept=".SCTimeline,.json,.xml,.lgm,.nacmac" />
                                    <p>Arrastra aquí tu archivo</p>
                                </div>
                                <p style={{marginTop:'1rem',fontSize:'0.8rem',color:'#64748b'}}>Archivos soportados: .xml, .nacmac, .lgm, .SCTimeline</p>
                            </>
                        ) : (
                            <>
                                <div style={{marginBottom:'1rem'}}><span className="badge">Detectado: {fileType}</span></div>
                                <div className="controls">
                                    <div className="input-group">
                                        <label>Inicio actual:</label>
                                        <input type="text" readOnly value={formatTime(currentStartTime)} style={{opacity:0.7}} />
                                    </div>
                                    <div className="input-group">
                                        <label>Nuevo inicio:</label>
                                        <input type="text" value={targetStartTimeStr} onChange={e => setTargetStartTimeStr(e.target.value)} />
                                    </div>
                                    <button onClick={applyShift} className="btn-nav">Mover</button>
                                </div>
                                <div className="controls" style={{marginTop:'2rem',paddingTop:'2rem',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
                                    <button onClick={() => setView('editor')} className="btn-admin">🛠 Editor</button>
                                    <button onClick={() => setView('inspector')} className="btn-inspector">🔍 Inspector</button>
                                    <button onClick={downloadXml} className="btn-primary">💾 Descargar XML</button>
                                </div>
                            </>
                        )}
                    </div>
                    {instances.length > 0 && (
                        <div className="section" style={{textAlign:'left'}}>
                            <h2 style={{fontSize:'1.2rem',marginBottom:'1.5rem',color:'#94a3b8'}}>Vista Previa</h2>
                            <div className="table-container">
                                <table>
                                    <thead><tr><th>ID</th><th>Código</th><th>Inicio</th><th>Fin</th></tr></thead>
                                    <tbody>{instances.slice(0, 100).map(inst => (
                                        <tr key={inst.id}><td>{inst.id}</td><td><span className="badge">{inst.code}</span></td><td>{formatTime(inst.start)}</td><td>{formatTime(inst.end)}</td></tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
